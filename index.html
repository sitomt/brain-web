<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO: Title + Description -->
    <title>BrAIn · Agencia de IA en Murcia | Automatización con Inteligencia Artificial</title>
    <meta name="description" content="Agencia de Inteligencia Artificial en Murcia. Chatbots, Agentes IA y automatización de procesos para empresas. Resultados en menos de 30 días. Primera consulta gratuita." />
    <meta name="robots" content="index, follow" />

    <!-- SEO: Canonical URL (reemplaza TU-DOMINIO.es con el dominio real) -->
    <link rel="canonical" href="https://TU-DOMINIO.es/" />

    <!-- Open Graph (LinkedIn, Facebook, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://TU-DOMINIO.es/" />
    <meta property="og:title" content="BrAIn · Agencia de IA en Murcia" />
    <meta property="og:description" content="Chatbots, Agentes IA y automatización de procesos para empresas. Resultados en menos de 30 días. Primera consulta gratuita." />
    <meta property="og:image" content="https://TU-DOMINIO.es/og-image.png" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:site_name" content="BrAIn" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="BrAIn · Agencia de IA en Murcia" />
    <meta name="twitter:description" content="Chatbots, Agentes IA y automatización para empresas. Primera consulta gratuita." />
    <meta name="twitter:image" content="https://TU-DOMINIO.es/og-image.png" />

    <!-- Schema JSON-LD: Organización + Negocio Local -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": ["Organization", "LocalBusiness"],
          "@id": "https://TU-DOMINIO.es/#organization",
          "name": "BrAIn",
          "url": "https://TU-DOMINIO.es",
          "description": "Agencia de Inteligencia Artificial especializada en chatbots, agentes IA y automatización de procesos para empresas.",
          "address": {
            "@type": "PostalAddress",
            "addressLocality": "Murcia",
            "addressRegion": "Región de Murcia",
            "addressCountry": "ES"
          },
          "areaServed": "ES",
          "knowsAbout": ["Inteligencia Artificial", "Automatización empresarial", "Chatbots", "Agentes IA", "Contact Center IA"],
          "hasOfferCatalog": {
            "@type": "OfferCatalog",
            "name": "Soluciones de IA para empresas",
            "itemListElement": [
              {
                "@type": "Offer",
                "itemOffered": {
                  "@type": "Service",
                  "name": "Contact Center IA 24/7",
                  "description": "Chatbot y voz inteligente que atiende a tus clientes por cualquier canal a cualquier hora."
                }
              },
              {
                "@type": "Offer",
                "itemOffered": {
                  "@type": "Service",
                  "name": "Business Intelligence Conversacional",
                  "description": "Conectamos tu stock, reservas o CRM a un chat. Pregunta en español normal, respuesta en segundos."
                }
              },
              {
                "@type": "Offer",
                "itemOffered": {
                  "@type": "Service",
                  "name": "Agentes IA",
                  "description": "Agentes autónomos que ejecutan procesos completos sin supervisión."
                }
              }
            ]
          }
        }
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&family=Syne+Mono&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
